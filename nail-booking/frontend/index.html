<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!--
    maximum-scale=1 prevents iOS from zooming on input focus.
    We already set font-size:16px on all inputs to make this unnecessary,
    but this is a belt-and-suspenders guard.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Nail Studio – Reserva tu cita</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ HERO ═══════════════════════════════════════════════════════════ -->
  <header class="hero">
    <span class="hero-nail">💅</span>
    <h1>Nail Studio</h1>
    <p>Belleza en cada detalle</p>
    <div class="hero-wave">
      <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,30 C300,60 900,0 1200,30 L1200,60 L0,60 Z" fill="#fff8fb"/>
      </svg>
    </div>
  </header>

  <!-- ═══ BOOKING ════════════════════════════════════════════════════════ -->
  <main class="booking-section">
    <div class="container">

      <h2 class="section-title">Reserva tu cita</h2>
      <p class="section-sub">Elige fecha, horario y servicio</p>

      <!-- Wrapper hidden when confirmation is shown -->
      <div id="booking-wrapper">
        <div class="booking-layout">

          <!-- ── Col A: Calendar + Time Slots ── -->
          <div class="card" id="calendar-card">
            <div class="calendar-nav">
              <button class="nav-btn" onclick="prevMonth()" aria-label="Mes anterior">&#8249;</button>
              <h3 id="month-title"></h3>
              <button class="nav-btn" onclick="nextMonth()" aria-label="Mes siguiente">&#8250;</button>
            </div>
            <div id="calendar"></div>

            <!-- Time slots injected here after date selection -->
            <div id="time-slots-section" class="slots-section" style="display:none"></div>
          </div>

          <!-- ── Col B: Form ── -->
          <div class="card" id="form-card">
            <!-- Summary pill: shows selected date + time -->
            <div id="booking-summary" class="booking-summary"></div>

            <form id="booking-form" onsubmit="submitBooking(event)" novalidate>

              <div class="form-group">
                <label for="service">Servicio</label>
                <select id="service" required>
                  <option value="">Selecciona un servicio…</option>
                  <option value="Manicura">Manicura</option>
                  <option value="Esmaltado semipermanente">Esmaltado semipermanente</option>
                  <option value="Nail art">Nail art</option>
                </select>
              </div>

              <div class="form-group">
                <label for="clientName">Tu nombre</label>
                <input type="text" id="clientName" placeholder="Nombre completo"
                       required autocomplete="name" minlength="2">
              </div>

              <div class="form-group">
                <label for="phone">Teléfono</label>
                <input type="tel" id="phone" placeholder="+34 600 000 000"
                       required autocomplete="tel">
              </div>

              <div id="error-msg" class="error-msg" role="alert"></div>

              <!-- Desktop-only inline submit button -->
              <button type="submit" id="submit-btn" class="btn-primary btn-in-form">
                Confirmar Reserva
              </button>

            </form>
          </div>

        </div><!-- /booking-layout -->
      </div><!-- /booking-wrapper -->

    </div><!-- /container -->
  </main>

  <!-- ═══ FULL-SCREEN CONFIRMATION OVERLAY ══════════════════════════════ -->
  <div id="confirm-overlay" class="confirm-overlay" role="dialog" aria-modal="true" aria-label="Reserva confirmada">
    <div class="confirm-card">
      <span class="confirm-emoji">🎉</span>
      <h2>¡Reserva Confirmada!</h2>
      <p>Te esperamos con mucho cariño. ¡Hasta pronto!</p>

      <div class="confirm-details">
        <div class="confirm-row">
          <span class="c-label">Nombre</span>
          <span class="c-value" id="conf-name"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Servicio</span>
          <span class="c-value" id="conf-service"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Fecha</span>
          <span class="c-value" id="conf-date"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Hora</span>
          <span class="c-value" id="conf-time"></span>
        </div>
      </div>

      <button onclick="resetBooking()" class="btn-secondary">
        Hacer otra reserva
      </button>
    </div>
  </div>

  <!-- ═══ STICKY CTA BAR (mobile only) ══════════════════════════════════ -->
  <div class="sticky-cta" id="sticky-cta" aria-live="polite">
    <div class="sticky-cta-info">
      <div class="cta-prompt" id="cta-prompt">Selecciona fecha y hora</div>
      <div class="cta-selection" id="cta-selection" style="display:none"></div>
    </div>
    <button class="sticky-btn" id="sticky-btn" onclick="submitBooking(event)" disabled>
      Reservar
    </button>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/booking.js"></script>
</body>
</html>
