<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Nail Studio – Reserva tu cita</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ HEADER ══════════════════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="studio-name">Nail Studio</div>
    <div class="studio-sub">Belleza en cada detalle</div>
  </header>

  <!-- ═══ MAIN ═════════════════════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- ── Services ────────────────────────────────────────────────── -->
    <section class="section">
      <div class="section-label">Elige tu servicio</div>
      <div class="service-grid" id="service-grid">
        <button class="service-card" type="button"
                data-service="Manicura"
                aria-pressed="false"
                onclick="selectService('Manicura')">
          <span class="service-icon">💅</span>
          <span class="service-name">Manicura</span>
        </button>
        <button class="service-card" type="button"
                data-service="Esmaltado semipermanente"
                aria-pressed="false"
                onclick="selectService('Esmaltado semipermanente')">
          <span class="service-icon">✨</span>
          <span class="service-name">Semipermanente</span>
        </button>
        <button class="service-card" type="button"
                data-service="Nail art"
                aria-pressed="false"
                onclick="selectService('Nail art')">
          <span class="service-icon">🎨</span>
          <span class="service-name">Nail art</span>
        </button>
        <button class="service-card" type="button"
                data-service="Esculpidas"
                aria-pressed="false"
                onclick="selectService('Esculpidas')">
          <span class="service-icon">💎</span>
          <span class="service-name">Esculpidas</span>
        </button>
      </div>
      <!-- Hidden select kept in sync — submitBooking() reads this -->
      <select id="service" required style="display:none" aria-hidden="true" tabindex="-1">
        <option value="">Selecciona un servicio…</option>
        <option value="Manicura">Manicura</option>
        <option value="Esmaltado semipermanente">Esmaltado semipermanente</option>
        <option value="Nail art">Nail art</option>
        <option value="Esculpidas">Esculpidas</option>
      </select>
    </section>

    <!-- ── Date ──────────────────────────────────────────────────────── -->
    <section class="section">
      <div class="section-label">Elige tu fecha</div>
      <div class="date-strip-wrap">
        <div class="date-strip" id="date-pills" role="list" aria-label="Selecciona una fecha"></div>
      </div>
    </section>

    <!-- ── Time Slots ─────────────────────────────────────────────────── -->
    <div id="time-slots-section" style="display:none">
      <section class="section">
        <div class="section-label">Elige tu horario</div>
        <div class="time-grid" id="time-slots-grid" role="list"></div>
      </section>
    </div>

    <!-- ── Personal Details ───────────────────────────────────────────── -->
    <section class="section">
      <div class="section-label">Tus datos</div>
      <form id="booking-form" onsubmit="submitBooking(event)" novalidate>
        <div class="form-group">
          <label for="clientName">Nombre</label>
          <input type="text" id="clientName" placeholder="Tu nombre completo"
                 required autocomplete="name" minlength="2">
        </div>
        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input type="tel" id="phone" placeholder="+34 600 000 000"
                 required autocomplete="tel">
        </div>
        <div id="error-msg" class="error-msg" role="alert"></div>
      </form>
    </section>

  </main>

  <!-- ═══ FULL-SCREEN CONFIRMATION OVERLAY ══════════════════════════════ -->
  <div id="confirm-overlay" class="confirm-overlay"
       role="dialog" aria-modal="true" aria-label="Reserva confirmada">
    <div class="confirm-content">
      <div class="check-circle">✓</div>
      <h2 class="confirm-title">¡Reserva Confirmada!</h2>
      <p class="confirm-sub">Te esperamos con mucho cariño</p>

      <div class="confirm-details">
        <div class="confirm-row">
          <span class="c-label">Nombre</span>
          <span class="c-value" id="conf-name"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Servicio</span>
          <span class="c-value" id="conf-service"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Fecha</span>
          <span class="c-value" id="conf-date"></span>
        </div>
        <div class="confirm-row">
          <span class="c-label">Hora</span>
          <span class="c-value" id="conf-time"></span>
        </div>
      </div>

      <button onclick="resetBooking()" class="new-booking-btn">
        Nueva reserva
      </button>
    </div>
  </div>

  <!-- ═══ FIXED CTA BUTTON ════════════════════════════════════════════ -->
  <button id="cta-btn" class="cta-btn" onclick="submitBooking(event)" disabled>
    Reservar
  </button>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/booking.js"></script>
</body>
</html>
